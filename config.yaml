# ──────────────────────────────────────────────
# ZTF Light Curve Similarity — config.yaml
# Verified against ALeRCE API 2025-01
# ──────────────────────────────────────────────

database:
  dir: "./ztf_data"
  features_file: "features.h5"
  metadata_file: "metadata.db"
  cache_subdir: "lc_cache"

index:
  file: "similarity.index"
  type: "flat"        # flat | ivf | hnsw
  metric: "cosine"    # cosine | l2
  ivf_nlist: 256
  ivf_nprobe: 32
  hnsw_m: 32

alerce:
  timeout: 30
  max_retries: 3
  request_delay: 0.15

features:
  bands: [1, 2]
  min_obs_per_band: 5
  ls_min_period: 0.1
  ls_max_period: 500.0
  ls_samples_per_peak: 5

catalog:
  # Verified 2025-01 via GET /classifiers
  # lc_classifier has all 15 specific classes below
  classifier: "lc_classifier"

  classes:
    # ── Periodic ──────────────────────────────
    - "RRL"             # RR Lyrae
    - "LPV"             # Long Period Variables
    - "E"               # Eclipsing Binaries  ← NOTE: "E" not "EB"
    - "DSCT"            # Delta Scuti
    - "CEP"             # Cepheids
    - "Periodic-Other"
    # ── Stochastic ────────────────────────────
    - "AGN"
    - "QSO"
    - "Blazar"
    - "CV/Nova"
    - "YSO"
    # ── Transient ─────────────────────────────
    - "SNIa"
    - "SNIbc"
    - "SNII"
    - "SLSN"

  min_probability: 0.6
  max_per_class: 10000
  n_workers: 4
